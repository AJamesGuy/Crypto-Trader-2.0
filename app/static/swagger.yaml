swagger: '2.0'
info:
  title: 'CryptoTemple API'
  description: 'Cryptocurrency trading simulation platform API'
  version: '1.0.0'

host: 'localhost:5000'
schemes:
  - 'http'
consumes:
  - 'application/json'
produces:
  - 'application/json'

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: 'JWT token for authentication (format: Bearer <token>)'

paths:

# ============================================================================
# AUTH ENDPOINTS
# ============================================================================

  /auth/signup:
    post:
      tags:
        - Authentication
      summary: "Create new user account"
      description: "Create a new user account with email and password (rate limited to 5 per minute)"
      parameters:
        - in: "body"
          name: "body"
          description: "User registration information"
          required: true
          schema:
            $ref: "#/definitions/SignupRequest"
      responses:
        201:
          description: "User created successfully"
          schema:
            $ref: "#/definitions/UserResponse"
          examples:
            application/json:
              message: "User created successfully"
              user:
                id: 1
                username: "john_doe"
                email: "john@example.com"
                cash_balance: 10000.0
        400:
          description: "Validation error"
          schema:
            $ref: "#/definitions/ErrorResponse"
        409:
          description: "User already exists"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/login:
    post:
      tags:
        - Authentication
      summary: "User login"
      description: "Authenticate user and return JWT token (rate limited to 10 per minute)"
      parameters:
        - in: "body"
          name: "body"
          description: "Login credentials"
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        200:
          description: "Login successful"
          schema:
            $ref: "#/definitions/LoginResponse"
          examples:
            application/json:
              message: "Login successful"
              token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
              user:
                id: 1
                username: "john_doe"
                email: "john@example.com"
                cash_balance: 10000.0
        401:
          description: "Invalid credentials"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/{user_id}/profile:
    get:
      tags:
        - Authentication
      summary: "Get user profile"
      description: "Retrieve authenticated user's profile information"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Profile retrieved successfully"
          schema:
            $ref: "#/definitions/ProfileResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

# ============================================================================
# DASHBOARD ENDPOINTS
# ============================================================================

  /dash/cryptos:
    get:
      tags:
        - Dashboard
      summary: "Get all cryptocurrencies"
      description: "Retrieve list of all active cryptocurrencies (cached 5 minutes)"
      security:
        - bearerAuth: []
      responses:
        200:
          description: "Cryptocurrencies retrieved successfully"
          schema:
            type: array
            items:
              $ref: "#/definitions/CryptoData"
        401:
          description: "Token missing or invalid"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /dash/market-data:
    get:
      tags:
        - Dashboard
      summary: "Get market data for all cryptos"
      description: "Retrieve latest market data for all cryptocurrencies with rankings (cached 1 minute)"
      security:
        - bearerAuth: []
      responses:
        200:
          description: "Market data retrieved successfully"
          schema:
            type: array
            items:
              $ref: "#/definitions/MarketDataResponse"
          examples:
            application/json:
              - id: 1
                crypto_id: 1
                symbol: "BTC"
                name: "Bitcoin"
                price: 45000.50
                market_cap: 880000000000
                market_cap_rank: 1
                high_24h: 46000.00
                low_24h: 44000.00
                change_24h: 2.5
        401:
          description: "Token missing or invalid"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /dash/search:
    get:
      tags:
        - Dashboard
      summary: "Search cryptocurrencies"
      description: "Search cryptocurrencies by symbol or name (cached 5 minutes)"
      security:
        - bearerAuth: []
      parameters:
        - in: "query"
          name: "query"
          type: string
          required: true
          description: "Search term (symbol or name)"
        - in: "query"
          name: "limit"
          type: integer
          required: false
          default: 50
          description: "Max results to return"
      responses:
        200:
          description: "Search results"
          schema:
            type: array
            items:
              $ref: "#/definitions/CryptoData"
        400:
          description: "Invalid search query"
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          description: "Token missing or invalid"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /dash/market-data/{crypto_id}:
    get:
      tags:
        - Dashboard
      summary: "Get market data for specific crypto"
      description: "Retrieve market data for a specific cryptocurrency (cached 1 minute)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "crypto_id"
          type: integer
          required: true
          description: "Cryptocurrency ID"
      responses:
        200:
          description: "Market data retrieved successfully"
          schema:
            $ref: "#/definitions/DetailedMarketData"
        401:
          description: "Token missing or invalid"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Cryptocurrency or market data not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /dash/{user_id}/cash-balance:
    get:
      tags:
        - Dashboard
      summary: "Get user's cash balance"
      description: "Retrieve current cash balance for user"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Cash balance retrieved"
          schema:
            $ref: "#/definitions/CashBalanceResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

# ============================================================================
# TRADE ENDPOINTS
# ============================================================================

  /trade/{user_id}/order:
    post:
      tags:
        - Trading
      summary: "Place new order"
      description: "Create a new buy or sell order (rate limited to 20 per minute)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "body"
          name: "body"
          description: "Order details"
          required: true
          schema:
            $ref: "#/definitions/PlaceOrderRequest"
      responses:
        201:
          description: "Order placed successfully"
          schema:
            $ref: "#/definitions/OrderResponse"
        400:
          description: "Invalid order or insufficient balance"
          schema:
            $ref: "#/definitions/ErrorResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Cryptocurrency not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /trade/{user_id}/orders:
    get:
      tags:
        - Trading
      summary: "Get user's orders"
      description: "Retrieve paginated list of user's orders with optional filtering"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "query"
          name: "page"
          type: integer
          required: false
          default: 1
          description: "Page number"
        - in: "query"
          name: "per_page"
          type: integer
          required: false
          default: 10
          description: "Items per page"
        - in: "query"
          name: "status"
          type: string
          required: false
          enum: ["pending", "completed", "cancelled"]
          description: "Filter by order status"
      responses:
        200:
          description: "Orders retrieved successfully"
          schema:
            $ref: "#/definitions/PaginatedOrdersResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /trade/{user_id}/order/{order_id}:
    get:
      tags:
        - Trading
      summary: "Get specific order"
      description: "Retrieve details of a specific order"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "path"
          name: "order_id"
          type: integer
          required: true
          description: "Order ID"
      responses:
        200:
          description: "Order details retrieved"
          schema:
            $ref: "#/definitions/OrderDetailResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Order not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /trade/{user_id}/order/{order_id}/execute:
    post:
      tags:
        - Trading
      summary: "Execute pending order"
      description: "Execute a pending order and update portfolio holdings"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "path"
          name: "order_id"
          type: integer
          required: true
          description: "Order ID to execute"
      responses:
        200:
          description: "Order executed successfully"
          schema:
            $ref: "#/definitions/ExecuteOrderResponse"
        400:
          description: "Order cannot be executed (invalid status or insufficient balance)"
          schema:
            $ref: "#/definitions/ErrorResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Order not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /trade/{user_id}/order/{order_id}/cancel:
    post:
      tags:
        - Trading
      summary: "Cancel order"
      description: "Cancel a pending order"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "path"
          name: "order_id"
          type: integer
          required: true
          description: "Order ID to cancel"
      responses:
        200:
          description: "Order cancelled successfully"
          schema:
            $ref: "#/definitions/MessageResponse"
        400:
          description: "Order cannot be cancelled (not pending)"
          schema:
            $ref: "#/definitions/ErrorResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Order not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

# ============================================================================
# PORTFOLIO ENDPOINTS
# ============================================================================

  /portfolio/{user_id}:
    get:
      tags:
        - Portfolio
      summary: "Get user's portfolio"
      description: "Retrieve complete portfolio with all holdings and calculations (cached 1 minute)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Portfolio retrieved successfully"
          schema:
            $ref: "#/definitions/PortfolioResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User or portfolio not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /portfolio/{user_id}/holdings:
    get:
      tags:
        - Portfolio
      summary: "Get portfolio holdings"
      description: "Retrieve cryptocurrency holdings only (cached 1 minute)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Holdings retrieved successfully"
          schema:
            type: array
            items:
              $ref: "#/definitions/HoldingResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Portfolio not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /portfolio/{user_id}/performance:
    get:
      tags:
        - Portfolio
      summary: "Get portfolio performance data"
      description: "Retrieve performance data for charts (cached 5 minutes)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Performance data retrieved"
          schema:
            $ref: "#/definitions/PerformanceResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Portfolio not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /portfolio/{user_id}/breakdown:
    get:
      tags:
        - Portfolio
      summary: "Get asset breakdown"
      description: "Retrieve asset allocation breakdown including cash (cached 5 minutes)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Breakdown retrieved successfully"
          schema:
            $ref: "#/definitions/BreakdownResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Portfolio not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /portfolio/{user_id}/asset/{asset_id}:
    get:
      tags:
        - Portfolio
      summary: "Get specific asset details"
      description: "Retrieve detailed information for a specific portfolio asset"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "path"
          name: "asset_id"
          type: integer
          required: true
          description: "Asset ID"
      responses:
        200:
          description: "Asset details retrieved"
          schema:
            $ref: "#/definitions/AssetDetailResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Asset or portfolio not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /portfolio/{user_id}/assets:
    get:
      tags:
        - Portfolio
      summary: "Get all assets for user"
      description: "Retrieve all assets with their IDs for a user"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Assets retrieved successfully"
          schema:
            $ref: "#/definitions/AssetsListResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Portfolio not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

# ============================================================================
# SETTINGS ENDPOINTS
# ============================================================================

  /settings/{user_id}/profile:
    get:
      tags:
        - Settings
      summary: "Get user profile"
      description: "Retrieve user profile information"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Profile retrieved successfully"
          schema:
            $ref: "#/definitions/SettingsProfileResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

    put:
      tags:
        - Settings
      summary: "Update user profile"
      description: "Update username and/or email (rate limited to 10 per minute)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "body"
          name: "body"
          description: "Profile updates"
          required: true
          schema:
            $ref: "#/definitions/UpdateProfileRequest"
      responses:
        200:
          description: "Profile updated successfully"
          schema:
            $ref: "#/definitions/UpdateProfileResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"
        409:
          description: "Username or email already taken"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /settings/{user_id}/change-password:
    post:
      tags:
        - Settings
      summary: "Change password"
      description: "Update user password (rate limited to 5 per minute)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "body"
          name: "body"
          description: "Password information"
          required: true
          schema:
            $ref: "#/definitions/ChangePasswordRequest"
      responses:
        200:
          description: "Password changed successfully"
          schema:
            $ref: "#/definitions/MessageResponse"
        401:
          description: "Current password is incorrect"
          schema:
            $ref: "#/definitions/ErrorResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /settings/{user_id}/reset-balance:
    post:
      tags:
        - Settings
      summary: "Reset balance"
      description: "Reset balance to $10,000 and clear holdings (rate limited to 3 per day)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "body"
          name: "body"
          description: "Confirmation"
          required: true
          schema:
            $ref: "#/definitions/ConfirmationRequest"
      responses:
        200:
          description: "Balance reset successfully"
          schema:
            $ref: "#/definitions/ResetBalanceResponse"
        400:
          description: "Confirmation required"
          schema:
            $ref: "#/definitions/ErrorResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /settings/{user_id}/delete-account:
    delete:
      tags:
        - Settings
      summary: "Delete account"
      description: "Permanently delete user account (rate limited to 1 per day)"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
        - in: "body"
          name: "body"
          description: "Account deletion confirmation"
          required: true
          schema:
            $ref: "#/definitions/DeleteAccountRequest"
      responses:
        200:
          description: "Account deleted successfully"
          schema:
            $ref: "#/definitions/MessageResponse"
        400:
          description: "Confirmation required"
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          description: "Password is incorrect"
          schema:
            $ref: "#/definitions/ErrorResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /settings/{user_id}:
    get:
      tags:
        - Settings
      summary: "Get all settings"
      description: "Retrieve all user settings"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Settings retrieved successfully"
          schema:
            $ref: "#/definitions/AllSettingsResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /settings/{user_id}/security:
    get:
      tags:
        - Settings
      summary: "Get security settings"
      description: "Retrieve security-related information"
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "user_id"
          type: integer
          required: true
          description: "User ID"
      responses:
        200:
          description: "Security settings retrieved"
          schema:
            $ref: "#/definitions/SecuritySettingsResponse"
        403:
          description: "Unauthorized access"
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

# ============================================================================
# DEFINITIONS
# ============================================================================

definitions:

  # Auth Definitions
  SignupRequest:
    type: object
    required:
      - username
      - email
      - password
      - password_confirm
    properties:
      username:
        type: string
        minLength: 3
        maxLength: 100
        example: "john_doe"
      email:
        type: string
        format: email
        example: "john@example.com"
      password:
        type: string
        format: password
        minLength: 8
        example: "securepassword123"
      password_confirm:
        type: string
        format: password
        minLength: 8
        example: "securepassword123"

  LoginRequest:
    type: object
    required:
      - password
    properties:
      username:
        type: string
        example: "john_doe"
      email:
        type: string
        format: email
        example: "john@example.com"
      password:
        type: string
        format: password
        example: "securepassword123"

  LoginResponse:
    type: object
    properties:
      message:
        type: string
        example: "Login successful"
      token:
        type: string
        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      user:
        $ref: "#/definitions/UserData"

  UserResponse:
    type: object
    properties:
      message:
        type: string
        example: "User created successfully"
      user:
        $ref: "#/definitions/UserData"

  UserData:
    type: object
    properties:
      id:
        type: integer
        example: 1
      username:
        type: string
        example: "john_doe"
      email:
        type: string
        example: "john@example.com"
      cash_balance:
        type: number
        format: float
        example: 10000.0

  ProfileResponse:
    type: object
    properties:
      id:
        type: integer
      username:
        type: string
      email:
        type: string
      cash_balance:
        type: number
        format: float
      created_at:
        type: string
        format: date-time
      last_login:
        type: string
        format: date-time
        nullable: true

  # Dashboard Definitions
  CryptoData:
    type: object
    properties:
      id:
        type: integer
      symbol:
        type: string
      description:
        type: string
      image:
        type: string
        nullable: true
      is_active:
        type: boolean
      created_at:
        type: string
        format: date-time

  MarketDataResponse:
    type: object
    properties:
      id:
        type: integer
      crypto_id:
        type: integer
      symbol:
        type: string
      name:
        type: string
      image:
        type: string
        nullable: true
      price:
        type: number
        format: float
      market_cap:
        type: number
        format: float
        nullable: true
      market_cap_rank:
        type: integer
      high_24h:
        type: number
        format: float
        nullable: true
      low_24h:
        type: number
        format: float
        nullable: true
      change_24h:
        type: number
        format: float
        nullable: true

  DetailedMarketData:
    type: object
    properties:
      id:
        type: integer
      crypto_id:
